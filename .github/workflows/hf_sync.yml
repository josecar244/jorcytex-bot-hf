name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # REEMPLAZA 'Jorcytex-Bot' con el nombre real de tu Space si es distinto
          git push --force https://josecar244:$HF_TOKEN@huggingface.co/spaces/josecar244/Jorcytex-Bot main
